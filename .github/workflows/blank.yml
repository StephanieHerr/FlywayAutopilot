name: Ten Sequential Jobs

on:
  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 1"

  job-2:
    runs-on: ubuntu-latest
    needs: job-1
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 2"

  job-3:
    runs-on: ubuntu-latest
    needs: job-2
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 3"

  job-4:
    runs-on: ubuntu-latest
    needs: job-3
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 4"

  job-5:
    runs-on: ubuntu-latest
    needs: job-4
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 5"

  job-6:
    runs-on: ubuntu-latest
    needs: job-5
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 6"

  job-7:
    runs-on: ubuntu-latest
    needs: job-6
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 7"

  job-8:
    runs-on: ubuntu-latest
    needs: job-7
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 8"

  job-9:
    runs-on: ubuntu-latest
    needs: job-8
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 9"

  job-10:
    runs-on: ubuntu-latest
    needs: job-9
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 10"
