name: Ten Jobs Hello World

on:
  workflow_dispatch:

jobs:
  # Jobs 1 through 4 run simultaneously in parallel
  job-1:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 1"

  job-2:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 2"

  job-3:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 3"

  job-4:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 4"

  # Jobs 5 through 8 also run in parallel but wait for the first batch to finish
  job-5:
    runs-on: ubuntu-latest
    needs: [job-1, job-2, job-3, job-4]
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 5"

  job-6:
    runs-on: ubuntu-latest
    needs: [job-1, job-2, job-3, job-4]
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 6"

  job-7:
    runs-on: ubuntu-latest
    needs: [job-1, job-2, job-3, job-4]
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 7"

  job-8:
    runs-on: ubuntu-latest
    needs: [job-1, job-2, job-3, job-4]
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 8"

  # Job 9 waits for the second batch to finish
  job-9:
    runs-on: ubuntu-latest
    needs: [job-5, job-6, job-7, job-8]
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 9"

  # Job 10 runs last as the final bottleneck
  job-10:
    runs-on: ubuntu-latest
    needs: [job-9]
    steps:
      - name: Print Hello
        run: echo "Hello World from Job 10"
